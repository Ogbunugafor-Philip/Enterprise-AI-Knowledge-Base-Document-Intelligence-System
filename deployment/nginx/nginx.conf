worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=1r/s;

    upstream backend_api {
        server backend:8000;
    }

    upstream frontend_app {
        server frontend:80;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    map $http_origin $cors_origin {
        default "";
        "~^https://docintel\.space$"       $http_origin;
        "~^https://www\.docintel\.space$"  $http_origin;
    }

    # HTTP — ACME challenge passthrough and redirect everything else
    server {
        listen 80;
        server_name docintel.space www.docintel.space;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://docintel.space$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name docintel.space www.docintel.space;

        ssl_certificate     /etc/letsencrypt/live/docintel.space/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/docintel.space/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        client_max_body_size 100m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;

        if ($request_uri ~* "(\.\.|%2e%2e|union.*select|drop.*table|insert.*into|or%201=1|xp_cmdshell|--)" ) {
            return 400;
        }

        location ~ /\.(git|env|ht|svn) {
            deny all;
            return 404;
        }

        location = /nginx-status {
            stub_status;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # Backend — auth login (stricter rate limit)
        location = /api/v1/auth/login {
            limit_req zone=login_per_ip burst=5 nodelay;
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend — all API routes
        location /api/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI interactive docs
        location /docs {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend health check (no rate limit, no logging overhead)
        location = /health {
            access_log off;
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_read_timeout 10s;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend (React SPA)
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
