services:
  backend:
    build:
      context: ../backend
    container_name: ent_rag_backend
    restart: always
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
    volumes:
      - ../uploads:/app/uploads
      - ../backups:/app/backups
    networks:
      - ent_rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend
    container_name: ent_rag_frontend
    restart: always
    networks:
      - ent_rag_network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: ent_rag_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ent_rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: ent_rag_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ent_rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ent_rag_qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ent_rag_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          memory: 1G

  celery_worker:
    build:
      context: ../backend
    container_name: ent_rag_celery
    restart: always
    command: celery -A worker.celery_config.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
    volumes:
      - ../uploads:/app/uploads
      - ../backups:/app/backups
    networks:
      - ent_rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  celery_beat:
    build:
      context: ../backend
    container_name: ent_rag_celery_beat
    restart: always
    command: celery -A worker.celery_config.celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
    networks:
      - ent_rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: ent_rag_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - certbot_data:/etc/letsencrypt:ro
    networks:
      - ent_rag_network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: ent_rag_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  certbot_data:

networks:
  ent_rag_network:
    driver: bridge
